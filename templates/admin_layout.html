<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Admin Panel{% endblock %}</title>

    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-dark: #081523;
            --bg-mid: #10253b;
            --sidebar: rgba(9, 20, 34, 0.95);
            --panel: rgba(17, 32, 49, 0.78);
            --panel-border: rgba(255, 255, 255, 0.10);
            --text-main: #f3f7fc;
            --text-soft: #a8b7ca;
            --accent: #f59e0b;
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.32);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Outfit", sans-serif;
            color: var(--text-main);
            background:
                radial-gradient(circle at top left, rgba(245, 158, 11, 0.20), transparent 30%),
                radial-gradient(circle at bottom right, rgba(20, 184, 166, 0.18), transparent 26%),
                linear-gradient(135deg, var(--bg-dark), var(--bg-mid));
            background-attachment: fixed;
            overflow-x: hidden;
        }

        /* Layout */
        .admin-shell {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }

        /* Sidebar Styling */
        .admin-sidebar {
            position: sticky;
            top: 0;
            height: 100vh;
            background: var(--sidebar);
            border-right: 1px solid var(--panel-border);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(12px);
        }

        .brand-pill {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.08);
            color: #fcd978;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            margin-bottom: 24px;
        }

        .brand-pill::before {
            content: "";
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 0 6px rgba(245, 158, 11, 0.15);
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-grow: 1;
        }

        .nav-button {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 18px;
            border-radius: 16px;
            text-decoration: none;
            color: #fff;
            font-weight: 600;
            font-size: 1.05rem;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid transparent;
        }

        .nav-button i {
            font-size: 1.25rem;
            opacity: 0.8;
            transition: transform 0.2s;
        }

        .nav-button:hover {
            transform: translateX(4px);
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
            color: #fff;
        }

        .nav-button:hover i {
            transform: scale(1.1);
        }

        /* Specific Button Gradients for active/highlight states */
        .nav-dashboard.active { background: linear-gradient(135deg, rgba(245, 158, 11, 0.2), rgba(234, 88, 12, 0.1)); border-color: rgba(245, 158, 11, 0.3); color: #fcd34d; }
        .nav-view.active      { background: linear-gradient(135deg, rgba(59, 130, 246, 0.2), rgba(29, 78, 216, 0.1)); border-color: rgba(59, 130, 246, 0.3); color: #93c5fd; }
        .nav-bulk.active      { background: linear-gradient(135deg, rgba(20, 184, 166, 0.2), rgba(15, 118, 110, 0.1)); border-color: rgba(20, 184, 166, 0.3); color: #5eead4; }
        
        .nav-logout {
            margin-top: auto;
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        
        .nav-logout:hover {
            background: rgba(239, 68, 68, 0.2);
            color: #fee2e2;
        }

        .admin-main {
            padding: 30px 40px;
            overflow-y: auto;
        }

        /* Utilities */
        .glass-card {
            background: var(--panel);
            border: 1px solid var(--panel-border);
            border-radius: 24px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(16px);
            padding: 24px;
        }

        /* Form Visibility Fixes */
        .form-control::placeholder {
            color: rgba(255, 255, 255, 0.6) !important;
            opacity: 1; /* Fix for Firefox */
        }

        .form-select option {
            background-color: var(--bg-dark) !important;
            color: #ffffff !important;
        }

        /* Responsive */
        @media (max-width: 991px) {
            .admin-shell {
                grid-template-columns: 1fr;
            }

            .admin-sidebar {
                height: auto;
                position: relative;
                padding: 20px;
                border-right: none;
                border-bottom: 1px solid var(--panel-border);
            }

            .sidebar-nav {
                flex-direction: row;
                flex-wrap: wrap;
                margin-top: 10px;
            }

            .nav-button {
                flex: 1 1 200px;
                justify-content: center;
            }

            .nav-logout {
                margin-top: 0;
            }
        }
        
        @media (max-width: 576px) {
            .admin-main {
                padding: 15px;
            }
        }

        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>
    <div class="admin-shell">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="brand-pill">Admin Workspace</div>
            
            <nav class="sidebar-nav">
                <a href="{{ url_for('dashboard') }}" class="nav-button nav-dashboard {% if request.endpoint == 'dashboard' %}active{% endif %}">
                    <i class="bi bi-grid-fill"></i>
                    <span>Dashboard</span>
                </a>
                
                <a href="{{ url_for('view_visitors') }}" class="nav-button nav-view {% if request.endpoint == 'view_visitors' or request.endpoint == 'edit_visitor' %}active{% endif %}">
                    <i class="bi bi-people-fill"></i>
                    <span>View Visitors</span>
                </a>
                
                <a href="{{ url_for('bulk_message') }}" class="nav-button nav-bulk {% if request.endpoint == 'bulk_message' %}active{% endif %}">
                    <i class="bi bi-chat-square-text-fill"></i>
                    <span>Bulk Message</span>
                </a>

                <!-- Spacing block -->
                <div style="flex-grow: 1;"></div>
                
                <a href="{{ url_for('logout') }}" class="nav-button nav-logout">
                    <i class="bi bi-box-arrow-left"></i>
                    <span>Logout</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="admin-main">
            {% block content %}
            {% endblock %}
        </main>
    </div>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
